# WhisperApp Configuration

hardware:
  device: "leap_motion"
  target_fps: 60
  buffer_duration: 3.0  # seconds — must match data.window_duration in Whisper_modification config

model:
  checkpoint_path: "../../Whisper_modification/checkpoints/final_model.pt"
  vocab_path: "./label_map.json"
  device: "cuda"  # or "cpu"
  window_duration: 3.0  # seconds — matches data.window_duration in Whisper_modification config
  window_overlap: 0.5   # keep 50% overlap between consecutive windows
  inference_interval: 0.5

preprocessing:
  spatial_normalization: true
  scale_normalization: true
  coordinate_normalization: true
  sensor_range_mm: 500.0

ui:
  window_width: 1200
  window_height: 800
  visualization_fps: 30
  show_skeleton: true
  show_confidence: true

logging:
  level: "INFO"
  file: "logs/app.log"